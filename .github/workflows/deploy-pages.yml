# Copyright Nisse Group Ltd
# Build the @nissegroup/hub PWA and publish it to GitHub Pages.
#
# Note: GitHub Pages is static-only. The hub is deployed as a UI with a baked-in
# last-known status snapshot (public/status-fallback.json) and live DriveBC cams
# (loaded directly from DriveBC). Features that need the @nissegroup/core backend
# (incidents, community board, alerts, reporting) degrade gracefully — see the
# deploy notes in infra/RUNBOOK.md for hosting the backend.

name: Deploy hub to GitHub Pages

on:
  push:
    branches: [main]
  # Redeploy every 30 min to refresh the live status fallback (the cold-start
  # backstop) from Open511, so it's never stale. Only status-fallback.json
  # changes between scheduled runs, so the app bundle / service worker are
  # untouched and users aren't disrupted. (Actions are free on public repos.)
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel an in-progress deploy (a scheduled refresh shouldn't abort a push
# deploy); let them queue instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the "packageManager" field in package.json.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter @nissegroup/shared run build

      - name: Refresh live status fallback (from Open511)
        # Best-effort; the script exits 0 even if Open511 is unreachable so a
        # transient upstream outage never fails the deploy.
        run: node packages/hub/scripts/refresh-fallback.mjs

      - name: Build hub (under the /spakwus/ base path)
        run: pnpm --filter @nissegroup/hub run build
        env:
          VITE_BASE: /spakwus/

      - name: SPA fallback for deep links
        # GitHub Pages has no server-side rewrites; serving the app shell as
        # 404.html lets client-side routes (e.g. /spakwus/map) load correctly.
        run: cp packages/hub/dist/index.html packages/hub/dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/hub/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
